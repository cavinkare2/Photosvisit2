<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outlet Photo Gallery</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef4ff 0%, #dbe7ff 48%, #efe7ff 100%);
      min-height: 100vh;
      padding: 14px;
      color: #1f2937;
    }

    .container {
      max-width: 1800px;
      margin: 0 auto;
      background: rgba(255,255,255,0.96);
      border-radius: 16px;
      box-shadow: 0 14px 40px rgba(37, 99, 235, 0.14), 0 6px 18px rgba(109, 40, 217, 0.08);
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #1d4ed8 0%, #6d28d9 100%);
      color: white;
      padding: 18px 22px;
    }

    header h1 {
      font-size: 1.55rem;
    }

    .main {
      padding: 14px;
    }

    .loader {
      padding: 24px;
      text-align: center;
      font-weight: 600;
      color: #374151;
    }

    .filter-panel {
      background: linear-gradient(180deg, #f8fbff, #f4f7ff);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.06), 0 2px 8px rgba(99, 102, 241, 0.05);
    }

    .filter-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: #4338ca;
      margin-bottom: 10px;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
    }

    .filter-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: white;
      font-size: 0.9rem;
      outline: none;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .summary-bar {
      margin-bottom: 14px;
      background: #f8fbff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #374151;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .outlet-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.07);
      border: 1px solid #eaeaea;
    }

    .outlet-top {
      display: flex;
      gap: 14px;
      padding: 14px;
      border-bottom: 1px solid #eef2f7;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }

    .outlet-title-box {
      width: 320px;
      flex: 0 0 320px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 12px;
      padding: 14px;
    }

    .outlet-title-box h3 {
      font-size: 1.05rem;
      margin-bottom: 12px;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }

    .outlet-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      font-size: 0.82rem;
      background: rgba(255,255,255,0.14);
      border-radius: 10px;
      padding: 10px;
    }

    .meta-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.4;
    }

    .meta-item i {
      width: 14px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .meta-item span {
      word-break: break-word;
    }

    .photos-row {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(7, minmax(140px, 1fr));
      gap: 10px;
      min-width: 0;
    }

    .photo-box {
      border: 1px solid #eceff5;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .photo-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6d28d9;
      margin-bottom: 8px;
      text-align: center;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
    }

    .image-container {
      width: 100%;
      height: 150px;
      overflow: hidden;
      border-radius: 8px;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .image-container img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      transition: transform 0.25s ease;
    }

    .image-container:hover img {
      transform: scale(1.03);
    }

    .no-image {
      color: #999;
      font-style: italic;
      text-align: center;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #6b7280;
      background: white;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
    }

    .footer-note {
      margin-top: 10px;
      text-align: right;
      font-size: 0.75rem;
      color: #64748b;
    }

    .img-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .img-modal.active {
      display: flex;
    }

    .img-modal-content {
      position: relative;
      width: 96vw;
      height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .img-modal-stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .img-modal-stage img {
      max-width: 92vw;
      max-height: 86vh;
      object-fit: contain;
      border-radius: 10px;
      background: white;
      transform-origin: center center;
      transition: transform 0.2s ease;
    }

    .img-close,
    .img-rotate {
      position: absolute;
      border: none;
      background: white;
      color: #111827;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      z-index: 2;
    }

    .img-close {
      top: 8px;
      right: 8px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      font-size: 1.2rem;
    }

    .img-rotate {
      bottom: 10px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
    }

    .img-rotate.left {
      left: calc(50% - 60px);
    }

    .img-rotate.right {
      left: calc(50% + 14px);
    }

    @media (max-width: 1600px) {
      .photos-row {
        grid-template-columns: repeat(4, minmax(140px, 1fr));
      }
    }

    @media (max-width: 1100px) {
      .outlet-top {
        flex-direction: column;
      }

      .outlet-title-box {
        width: 100%;
        flex: unset;
      }

      .photos-row {
        grid-template-columns: repeat(3, minmax(140px, 1fr));
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .photos-row {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }
    }

    @media (max-width: 520px) {
      .photos-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-images"></i> Outlet Photo Gallery</h1>
    </header>

    <div class="main">
      <div id="loader" class="loader">Loading data from Google Sheet...</div>

      <div id="dashboard" style="display:none;">
        <div class="filter-panel">
          <div class="filter-title">Filters</div>
          <div class="filter-grid">
            <div class="filter-group">
              <label for="nameFilter">Outlet Name</label>
              <input type="text" id="nameFilter" placeholder="Search outlet name...">
            </div>
            <div class="filter-group">
              <label for="shopOpenFilter">Shop Open</label>
              <select id="shopOpenFilter"></select>
            </div>
            <div class="filter-group">
              <label for="sampleBoxFilter">Sample Box Available</label>
              <select id="sampleBoxFilter"></select>
            </div>
          </div>
        </div>

        <div class="summary-bar" id="summaryBar">Showing 0 outlets</div>

        <div class="gallery-card">
          <div id="galleryGrid" class="gallery-grid"></div>
        </div>

        <div class="footer-note" id="lastUpdated"></div>
      </div>
    </div>
  </div>

  <div id="imgModal" class="img-modal">
    <div class="img-modal-content">
      <button id="imgCloseBtn" class="img-close">&times;</button>
      <button id="rotateLeftBtn" class="img-rotate left"><i class="fas fa-rotate-left"></i></button>
      <button id="rotateRightBtn" class="img-rotate right"><i class="fas fa-rotate-right"></i></button>
      <div class="img-modal-stage">
        <img id="imgModalView" src="" alt="Preview">
      </div>
    </div>
  </div>

  <script>
    const SHEET_ID = "18InpcM9xoDAoAiMk2rp8YIdVP1_XGThDvBhN_KHvnPc";
    const GID = "0";
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

    const fields = {
      outlet: "Name_of_Outlet",
      shopOpen: "Shop_Open",
      sampleBoxAvailable: "Sample_Box_Available",
      spinzStock: "Spinz_Stock_SKUs",
      otherProducts: "Other_CavinKare_Products_Available",
      shopFront: "Shop_Front_Photo_Link",
      sampleBox: "Sample_Box_Photo_Link",
      sampleBoxDistant: "Sample_Box_Distant_Photo_Link",
      spinzStockPhoto: "Spinz_Stock_Photo_Link",
      shelfPhoto: "Shelf_Photo_Link",
      posterPhoto: "Poster_Photo_Link",
      billCopy: "Bill_Copy_Photo_Link"
    };

    let rawData = [];
    let filteredData = [];
    let currentRotation = 0;

    function safeText(v) {
      return v === null || v === undefined ? "" : String(v).trim();
    }

    function normalizeRows(rows) {
      return rows
        .filter(row => Object.values(row).some(v => String(v || "").trim() !== ""))
        .map(row => {
          const out = {};
          Object.keys(row).forEach(k => out[k.trim()] = row[k]);
          return out;
        });
    }

    function convertDriveLink(link) {
      if (!link || String(link).trim() === "") return null;
      const raw = String(link).trim();

      if (raw.includes("drive.google.com/thumbnail?id=")) return raw;
      if (raw.match(/\.(png|jpg|jpeg|webp|gif)(\?.*)?$/i)) return raw;

      let fileId = null;
      const patterns = [
        /\/d\/([^\/\?]+)/,
        /id=([^&]+)/,
        /\/file\/d\/([^\/\?]+)/
      ];

      for (const pattern of patterns) {
        const match = raw.match(pattern);
        if (match && match[1]) {
          fileId = match[1];
          break;
        }
      }

      if (!fileId) return raw;
      return `https://drive.google.com/thumbnail?id=${fileId}&sz=w1400`;
    }

    function uniqueValues(data, fieldName) {
      const vals = Array.from(new Set(
        data.map(d => safeText(d[fieldName])).filter(v => v !== "")
      )).sort((a, b) => a.localeCompare(b));
      return ["All", ...vals];
    }

    function populateSelect(selectId, values, defaultValue = "All") {
      const select = document.getElementById(selectId);
      select.innerHTML = values.map(v => {
        const selected = v === defaultValue ? "selected" : "";
        return `<option value="${v}" ${selected}>${v}</option>`;
      }).join("");
    }

    function renderImageBlock(url, altText) {
      if (url) {
        const safeUrl = String(url).replace(/"/g, '&quot;');
        const safeAlt = String(altText).replace(/"/g, '&quot;');
        return `
          <div class="image-container" onclick="openImageModal('${safeUrl}')">
            <img src="${safeUrl}" alt="${safeAlt}" loading="lazy" referrerpolicy="no-referrer"
              onerror="this.onerror=null; this.parentElement.outerHTML='<div class=&quot;no-image&quot;><i class=&quot;fas fa-image&quot; style=&quot;opacity:0.4; margin-right:6px;&quot;></i> Image not available</div>';">
          </div>
        `;
      }
      return `<div class="no-image"><i class="fas fa-image" style="opacity:0.4; margin-right:6px;"></i> No image</div>`;
    }

    function applyFilters() {
      const nameValue = safeText(document.getElementById("nameFilter").value).toLowerCase();
      const shopOpenValue = safeText(document.getElementById("shopOpenFilter").value);
      const sampleBoxValue = safeText(document.getElementById("sampleBoxFilter").value);

      filteredData = rawData.filter(row => {
        const outlet = safeText(row[fields.outlet]).toLowerCase();
        const shopOpen = safeText(row[fields.shopOpen]);
        const sampleBox = safeText(row[fields.sampleBoxAvailable]);

        const nameMatch = !nameValue || outlet.includes(nameValue);
        const shopOpenMatch = shopOpenValue === "All" || shopOpen === shopOpenValue;
        const sampleBoxMatch = sampleBoxValue === "All" || sampleBox === sampleBoxValue;

        return nameMatch && shopOpenMatch && sampleBoxMatch;
      });

      renderGallery(filteredData);
      document.getElementById("summaryBar").textContent = `Showing ${filteredData.length} outlet(s)`;
      document.getElementById("lastUpdated").textContent = `Refreshed on ${new Date().toLocaleString()}`;
    }

    function renderGallery(data) {
      const gallery = document.getElementById("galleryGrid");

      if (!data.length) {
        gallery.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-store-slash" style="font-size:2rem; margin-bottom:12px; opacity:0.5;"></i>
            <h3 style="font-size:1rem; margin-bottom:6px;">No outlets found</h3>
            <p>Try changing the filters.</p>
          </div>
        `;
        return;
      }

      gallery.innerHTML = data.map(d => {
        const outlet = safeText(d[fields.outlet]) || "Unnamed Outlet";
        const shopOpen = safeText(d[fields.shopOpen]) || "-";
        const sampleBoxAvailable = safeText(d[fields.sampleBoxAvailable]) || "-";
        const spinzStock = safeText(d[fields.spinzStock]) || "-";
        const otherProducts = safeText(d[fields.otherProducts]) || "-";

        const shopFront = convertDriveLink(d[fields.shopFront]);
        const sampleBox = convertDriveLink(d[fields.sampleBox]);
        const sampleBoxDistant = convertDriveLink(d[fields.sampleBoxDistant]);
        const spinzStockPhoto = convertDriveLink(d[fields.spinzStockPhoto]);
        const shelfPhoto = convertDriveLink(d[fields.shelfPhoto]);
        const posterPhoto = convertDriveLink(d[fields.posterPhoto]);
        const billCopy = convertDriveLink(d[fields.billCopy]);

        return `
          <div class="outlet-card">
            <div class="outlet-top">
              <div class="outlet-title-box">
                <h3>${outlet}</h3>
                <div class="outlet-meta">
                  <div class="meta-item"><i class="fas fa-store"></i><span><strong>Shop Open:</strong> ${shopOpen}</span></div>
                  <div class="meta-item"><i class="fas fa-box-open"></i><span><strong>Sample Box Available:</strong> ${sampleBoxAvailable}</span></div>
                  <div class="meta-item"><i class="fas fa-cart-shopping"></i><span><strong>Spinz Stock SKUs:</strong> ${spinzStock}</span></div>
                  <div class="meta-item"><i class="fas fa-tags"></i><span><strong>Other CavinKare Products:</strong> ${otherProducts}</span></div>
                </div>
              </div>

              <div class="photos-row">
                <div class="photo-box">
                  <div class="photo-title">Shop Front</div>
                  ${renderImageBlock(shopFront, `Shop front - ${outlet}`)}
                </div>

                <div class="photo-box">
                  <div class="photo-title">Sample Box</div>
                  ${renderImageBlock(sampleBox, `Sample box - ${outlet}`)}
                </div>

                <div class="photo-box">
                  <div class="photo-title">Sample Box Distant</div>
                  ${renderImageBlock(sampleBoxDistant, `Sample box distant - ${outlet}`)}
                </div>

                <div class="photo-box">
                  <div class="photo-title">Spinz Stock</div>
                  ${renderImageBlock(spinzStockPhoto, `Spinz stock - ${outlet}`)}
                </div>

                <div class="photo-box">
                  <div class="photo-title">Shelf</div>
                  ${renderImageBlock(shelfPhoto, `Shelf - ${outlet}`)}
                </div>

                <div class="photo-box">
                  <div class="photo-title">Poster</div>
                  ${renderImageBlock(posterPhoto, `Poster - ${outlet}`)}
                </div>

                <div class="photo-box">
                  <div class="photo-title">Bill Copy</div>
                  ${renderImageBlock(billCopy, `Bill copy - ${outlet}`)}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function applyImageRotation() {
      const img = document.getElementById("imgModalView");
      img.style.transform = `rotate(${currentRotation}deg)`;
    }

    function openImageModal(src) {
      const modal = document.getElementById("imgModal");
      const img = document.getElementById("imgModalView");
      currentRotation = 0;
      img.src = src;
      applyImageRotation();
      modal.classList.add("active");
    }

    function closeImageModal() {
      const modal = document.getElementById("imgModal");
      const img = document.getElementById("imgModalView");
      modal.classList.remove("active");
      img.src = "";
      currentRotation = 0;
      applyImageRotation();
    }

    document.getElementById("rotateLeftBtn").addEventListener("click", function(e) {
      e.stopPropagation();
      currentRotation -= 90;
      applyImageRotation();
    });

    document.getElementById("rotateRightBtn").addEventListener("click", function(e) {
      e.stopPropagation();
      currentRotation += 90;
      applyImageRotation();
    });

    document.getElementById("imgCloseBtn").addEventListener("click", closeImageModal);

    document.getElementById("imgModal").addEventListener("click", function(e) {
      if (e.target.id === "imgModal") closeImageModal();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeImageModal();
      if (document.getElementById("imgModal").classList.contains("active")) {
        if (e.key === "ArrowLeft") {
          currentRotation -= 90;
          applyImageRotation();
        }
        if (e.key === "ArrowRight") {
          currentRotation += 90;
          applyImageRotation();
        }
      }
    });

    function loadSheetData() {
      Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          rawData = normalizeRows(results.data);

          const shopOpenValues = uniqueValues(rawData, fields.shopOpen);
          const sampleBoxValues = uniqueValues(rawData, fields.sampleBoxAvailable);

          const openDefault =
            shopOpenValues.includes("Open") ? "Open" :
            shopOpenValues.includes("open") ? "open" :
            shopOpenValues.includes("OPEN") ? "OPEN" :
            "All";

          populateSelect("shopOpenFilter", shopOpenValues, openDefault);
          populateSelect("sampleBoxFilter", sampleBoxValues, "All");

          document.getElementById("nameFilter").addEventListener("input", applyFilters);
          document.getElementById("shopOpenFilter").addEventListener("change", applyFilters);
          document.getElementById("sampleBoxFilter").addEventListener("change", applyFilters);

          filteredData = [...rawData];

          document.getElementById("loader").style.display = "none";
          document.getElementById("dashboard").style.display = "block";

          applyFilters();
        },
        error: function(err) {
          document.getElementById("loader").innerHTML = `
            Failed to load Google Sheet data.<br><br>
            Check sharing settings, Sheet ID, or gid.<br>
            <span style="color:#b91c1c;">${err}</span>
          `;
        }
      });
    }

    loadSheetData();
  </script>
</body>
</html>
